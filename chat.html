<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>چت ماشین‌بازها | Simple Warmup</title>
    <meta name="description" content="چت آنلاین ماشین‌بازها - بحث و گفتگو درباره تیونینگ، ماشین و سرعت">
    <meta name="theme-color" content="#041a2e">
    <meta property="og:title" content="چت ماشین‌بازها | Simple Warmup">
    <meta property="og:description" content="چت آنلاین ماشین‌بازها">
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --ice1: #e0f7ff;
            --ice2: #b3ecff;
            --ice3: #5dd5f8;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --gold: #fbbf24;
            --red: #ef4444;
            --green: #22c55e
        }

        .chat-page-body {
            background: #041a2e;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            position: fixed;
            inset: 0
        }

        .chat-container {
            display: flex;
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 2
        }

        .chat-sidebar {
            width: 260px;
            background: linear-gradient(135deg, rgba(14, 165, 233, .12), rgba(93, 213, 248, .04));
            border-left: 1px solid rgba(125, 211, 252, .15);
            backdrop-filter: blur(30px);
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
            flex-shrink: 0
        }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(125, 211, 252, .1)
        }

        .sidebar-header h3 {
            color: var(--ice2);
            font-size: 16px;
            margin: 0
        }

        .back-btn {
            color: var(--ice3);
            font-size: 13px;
            padding: 6px 12px;
            border-radius: 8px;
            background: rgba(14, 165, 233, .15);
            border: 1px solid rgba(125, 211, 252, .2);
            transition: .3s;
            cursor: pointer;
            font-family: 'Vazirmatn', sans-serif
        }

        .back-btn:hover {
            background: rgba(14, 165, 233, .3);
            color: #fff
        }

        .user-card-mini {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            background: rgba(14, 165, 233, .1);
            border: 1px solid rgba(125, 211, 252, .15);
            border-radius: 14px;
            margin-bottom: 8px
        }

        .user-avatar-mini {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(14, 165, 233, .2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0
        }

        .user-info-mini {
            flex: 1;
            min-width: 0
        }

        .user-name-display {
            color: var(--ice2);
            font-size: 14px;
            font-weight: 600
        }

        .user-role-badge {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 99px;
            display: inline-block
        }

        .user-role-badge.admin {
            background: rgba(251, 191, 36, .2);
            color: var(--gold);
            border: 1px solid rgba(251, 191, 36, .3)
        }

        .user-role-badge.user {
            background: rgba(125, 211, 252, .1);
            color: var(--ice3);
            border: 1px solid rgba(125, 211, 252, .2)
        }

        .logout-btn-mini {
            padding: 6px 10px;
            border-radius: 8px;
            border: 1px solid rgba(239, 68, 68, .3);
            background: rgba(239, 68, 68, .1);
            color: #fca5a5;
            font-size: 11px;
            cursor: pointer;
            font-family: 'Vazirmatn', sans-serif;
            transition: .3s;
            white-space: nowrap
        }

        .logout-btn-mini:hover {
            background: rgba(239, 68, 68, .25)
        }

        .sidebar-section {
            margin-bottom: 20px
        }

        .sidebar-section h4 {
            color: rgba(179, 236, 255, .4);
            font-size: 11px;
            letter-spacing: 1px;
            margin-bottom: 10px
        }

        .group-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: .2s;
            margin-bottom: 4px
        }

        .group-item:hover {
            background: rgba(14, 165, 233, .1)
        }

        .group-item.active {
            background: rgba(14, 165, 233, .2);
            border: 1px solid rgba(125, 211, 252, .3)
        }

        .group-icon {
            font-size: 20px
        }

        .group-name {
            color: var(--ice2);
            font-size: 13px;
            display: block
        }

        .group-count {
            color: rgba(179, 236, 255, .3);
            font-size: 10px
        }

        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(14, 165, 233, .04);
            border-left: 1px solid rgba(125, 211, 252, .1);
            border-right: 1px solid rgba(125, 211, 252, .1);
            min-width: 0
        }

        .chat-header {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(14, 165, 233, .08);
            border-bottom: 1px solid rgba(125, 211, 252, .1);
            flex-shrink: 0;
            justify-content: space-between
        }

        .chat-header h2 {
            font-size: 16px;
            color: var(--ice2);
            margin: 0
        }

        .online-count {
            font-size: 10px;
            color: rgba(179, 236, 255, .4)
        }

        .online-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 10px rgba(34, 197, 94, .5);
            animation: onlinePulse 2s ease-in-out infinite
        }

        @keyframes onlinePulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: .5
            }
        }

        /* تایپینگ */
        .typing-indicator {
            padding: 8px 16px;
            font-size: 11px;
            color: rgba(93, 213, 248, .7);
            animation: typingFade 1s ease-in-out infinite;
            text-align: center;
            min-height: 24px
        }

        @keyframes typingFade {

            0%,
            100% {
                opacity: .4
            }

            50% {
                opacity: 1
            }
        }

        .typing-dots {
            display: inline-flex;
            gap: 3px
        }

        .typing-dots span {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--ice3);
            animation: typingDot 1.4s ease-in-out infinite
        }

        .typing-dots span:nth-child(2) {
            animation-delay: .2s
        }

        .typing-dots span:nth-child(3) {
            animation-delay: .4s
        }

        @keyframes typingDot {

            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: .3
            }

            30% {
                transform: translateY(-6px);
                opacity: 1
            }
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            -webkit-overflow-scrolling: touch
        }

        .message {
            display: flex;
            gap: 6px;
            max-width: 80%;
            animation: msgIn .3s ease;
            position: relative
        }

        .message.own {
            align-self: flex-end;
            flex-direction: row-reverse
        }

        @keyframes msgIn {
            from {
                opacity: 0;
                transform: translateY(10px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .msg-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(14, 165, 233, .2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
            cursor: pointer
        }

        .msg-bubble {
            padding: 8px 12px;
            border-radius: 14px;
            font-size: 13px;
            line-height: 1.6;
            word-break: break-word
        }

        .msg-bubble a {
            color: var(--ice3);
            text-decoration: underline;
            cursor: pointer
        }

        .msg-bubble a:hover {
            color: #fff
        }

        .message:not(.own) .msg-bubble {
            background: rgba(14, 165, 233, .15);
            border: 1px solid rgba(125, 211, 252, .2);
            border-bottom-right-radius: 4px;
            color: var(--ice2)
        }

        .message.own .msg-bubble {
            background: rgba(93, 213, 248, .2);
            border: 1px solid rgba(93, 213, 248, .3);
            border-bottom-left-radius: 4px;
            color: #fff
        }

        .msg-info {
            display: flex;
            gap: 4px;
            font-size: 9px;
            color: rgba(179, 236, 255, .3);
            margin-bottom: 2px
        }

        .message.own .msg-info {
            justify-content: flex-end
        }

        .edited-badge {
            font-size: 8px;
            color: rgba(179, 236, 255, .25)
        }

        /* ریپلای */
        .reply-preview {
            background: rgba(14, 165, 233, .1);
            border-right: 3px solid var(--ice3);
            padding: 6px 10px;
            border-radius: 8px;
            margin-bottom: 4px;
            font-size: 11px;
            color: rgba(179, 236, 255, .5);
            cursor: pointer;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap
        }

        .reply-preview:hover {
            background: rgba(14, 165, 233, .2)
        }

        .msg-reply-to {
            font-size: 10px;
            color: var(--ice3);
            margin-bottom: 2px;
            cursor: pointer
        }

        .msg-actions {
            display: none;
            position: absolute;
            top: -8px;
            gap: 2px;
            z-index: 5
        }

        .message.own .msg-actions {
            left: 0
        }

        .message:not(.own) .msg-actions {
            right: 0
        }

        .message:hover .msg-actions {
            display: flex
        }

        .msg-action-btn {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 1px solid rgba(125, 211, 252, .3);
            background: rgba(4, 26, 46, .85);
            color: var(--ice3);
            font-size: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: .2s
        }

        .msg-action-btn.delete:hover {
            background: rgba(239, 68, 68, .3);
            border-color: #ef4444;
            color: #fca5a5
        }

        .msg-action-btn.reply:hover {
            background: rgba(93, 213, 248, .3);
            border-color: var(--ice3);
            color: #fff
        }

        /* اسکرول به پایین */
        .scroll-bottom-btn {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 500;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: rgba(14, 165, 233, .3);
            border: 1px solid rgba(93, 213, 248, .4);
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            animation: bounceIn .3s ease;
            box-shadow: 0 5px 20px rgba(0, 0, 0, .3)
        }

        .scroll-bottom-btn.show {
            display: flex
        }

        .scroll-bottom-btn .badge {
            position: absolute;
            top: -6px;
            right: -6px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--red);
            color: #fff;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700
        }

        @keyframes bounceIn {
            from {
                transform: translateX(-50%) scale(0)
            }

            to {
                transform: translateX(-50%) scale(1)
            }
        }

        .chat-input-area {
            padding: 10px 12px;
            padding-bottom: calc(10px + var(--safe-bottom));
            display: flex;
            gap: 8px;
            align-items: center;
            background: rgba(14, 165, 233, .1);
            border-top: 1px solid rgba(125, 211, 252, .15);
            flex-shrink: 0;
            flex-wrap: wrap
        }

        .reply-bar {
            width: 100%;
            display: none;
            padding: 6px 10px;
            background: rgba(14, 165, 233, .15);
            border-radius: 10px;
            font-size: 11px;
            color: rgba(179, 236, 255, .6);
            align-items: center;
            justify-content: space-between
        }

        .reply-bar.show {
            display: flex
        }

        .reply-bar .cancel-reply {
            background: none;
            border: none;
            color: #fca5a5;
            cursor: pointer;
            font-size: 14px
        }

        .chat-input-area input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 20px;
            border: 1px solid rgba(125, 211, 252, .25);
            background: rgba(14, 165, 233, .12);
            color: var(--ice2);
            font-size: 14px;
            font-family: 'Vazirmatn', sans-serif;
            outline: none;
            min-width: 150px
        }

        .chat-input-area input:focus {
            border-color: var(--ice3)
        }

        .send-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 1px solid rgba(93, 213, 248, .4);
            background: linear-gradient(135deg, rgba(14, 165, 233, .3), rgba(93, 213, 248, .15));
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            transition: .3s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0
        }

        .admin-panel {
            display: none;
            position: fixed;
            right: 0;
            top: 0;
            bottom: 0;
            z-index: 300;
            width: 280px;
            background: rgba(4, 26, 46, .97);
            backdrop-filter: blur(30px);
            border-left: 1px solid rgba(251, 191, 36, .3);
            padding: 20px;
            overflow-y: auto
        }

        .admin-panel.open {
            display: block
        }

        .admin-panel h3 {
            color: var(--gold);
            font-size: 16px;
            margin-bottom: 16px;
            text-align: center
        }

        .admin-user-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid rgba(125, 211, 252, .1);
            gap: 8px;
            flex-wrap: wrap
        }

        .admin-user-item span {
            flex: 1;
            min-width: 100px;
            font-size: 12px;
            color: var(--ice2)
        }

        .admin-actions-row {
            display: flex;
            gap: 4px
        }

        .admin-close {
            position: absolute;
            top: 12px;
            left: 12px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1px solid rgba(251, 191, 36, .3);
            background: rgba(251, 191, 36, .1);
            color: var(--gold);
            font-size: 14px;
            cursor: pointer
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            padding: 12px 24px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
            backdrop-filter: blur(30px);
            opacity: 0;
            transition: all .4s;
            pointer-events: none;
            border: 1px solid
        }

        .toast.show {
            opacity: 1;
            top: 30px
        }

        .toast-success {
            background: rgba(34, 197, 94, .2);
            border-color: rgba(34, 197, 94, .4);
            color: #86efac
        }

        .toast-error {
            background: rgba(239, 68, 68, .2);
            border-color: rgba(239, 68, 68, .4);
            color: #fca5a5
        }

        .mobile-toggle {
            display: none;
            background: none;
            border: none;
            color: var(--ice2);
            font-size: 20px;
            cursor: pointer
        }

        .modal-glass-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .7);
            backdrop-filter: blur(8px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn .2s ease
        }

        .modal-glass-box {
            background: linear-gradient(135deg, rgba(14, 165, 233, .2), rgba(4, 26, 46, .95));
            border: 1px solid rgba(125, 211, 252, .4);
            border-radius: 24px;
            padding: 30px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            backdrop-filter: blur(30px);
            box-shadow: 0 25px 60px rgba(0, 0, 0, .5), 0 0 40px rgba(93, 213, 248, .2);
            animation: popIn .3s ease
        }

        .modal-glass-box h3 {
            color: var(--ice2);
            font-size: 18px;
            margin-bottom: 12px
        }

        .modal-glass-box p {
            color: rgba(179, 236, 255, .6);
            font-size: 14px;
            margin-bottom: 20px;
            line-height: 1.8
        }

        .modal-glass-box input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 14px;
            border: 1px solid rgba(125, 211, 252, .3);
            background: rgba(14, 165, 233, .15);
            color: var(--ice2);
            font-size: 14px;
            font-family: 'Vazirmatn', sans-serif;
            outline: none;
            margin-bottom: 15px;
            text-align: right
        }

        .modal-glass-btns {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap
        }

        .modal-glass-btns button {
            padding: 10px 24px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Vazirmatn', sans-serif;
            transition: .3s;
            border: 1px solid
        }

        .btn-danger {
            background: rgba(239, 68, 68, .25);
            border-color: rgba(239, 68, 68, .5);
            color: #fca5a5
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, .45);
            color: #fff
        }

        .btn-primary {
            background: rgba(93, 213, 248, .3);
            border-color: rgba(93, 213, 248, .5);
            color: #fff
        }

        .btn-primary:hover {
            background: rgba(93, 213, 248, .5)
        }

        .btn-cancel {
            background: rgba(255, 255, 255, .08);
            border-color: rgba(255, 255, 255, .15);
            color: rgba(255, 255, 255, .6)
        }

        .btn-cancel:hover {
            background: rgba(255, 255, 255, .15);
            color: #fff
        }

        .btn-success {
            background: rgba(34, 197, 94, .25);
            border-color: rgba(34, 197, 94, .5);
            color: #86efac
        }

        .btn-success:hover {
            background: rgba(34, 197, 94, .45);
            color: #fff
        }

        @keyframes fadeIn {
            from {
                opacity: 0
            }

            to {
                opacity: 1
            }
        }

        @keyframes popIn {
            from {
                transform: scale(.9);
                opacity: 0
            }

            to {
                transform: scale(1);
                opacity: 1
            }
        }

        @media(max-width:768px) {
            .chat-sidebar {
                display: none;
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                z-index: 200;
                width: 260px
            }

            .chat-sidebar.open {
                display: flex
            }

            .mobile-toggle {
                display: block
            }

            .message {
                max-width: 88%
            }

            .admin-panel {
                width: 100%
            }

            .modal-glass-box {
                width: 95%;
                padding: 24px 18px
            }

            .scroll-bottom-btn {
                bottom: 90px
            }
        }
    </style>
</head>

<body class="chat-page-body">
    <div class="mist-layer">
        <div class="mist mist-1"></div>
        <div class="mist mist-2"></div>
        <div class="mist mist-3"></div>
    </div>
    <div class="chat-container">
        <aside class="chat-sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3>🏎️ چت ماشین‌بازها</h3><button class="back-btn" id="closeSidebarBtn">← برگشت</button>
            </div>
            <div class="user-card-mini">
                <div class="user-avatar-mini" id="sidebarAvatar">👤</div>
                <div class="user-info-mini">
                    <div class="user-name-display" id="displayName">در حال ورود...</div><span
                        class="user-role-badge user" id="roleBadge">کاربر</span>
                </div><button class="logout-btn-mini" id="logoutBtn">🚪</button><button class="logout-btn-mini"
                    id="adminPanelBtn"
                    style="display:none;background:rgba(251,191,36,.15);border-color:rgba(251,191,36,.3);color:var(--gold)">👑</button>
            </div>
            <div class="sidebar-section">
                <h4>گروه‌ها</h4>
                <div class="group-item active" data-group="general"><span class="group-icon">💬</span>
                    <div><span class="group-name">عمومی</span><span class="group-count">--</span></div>
                </div>
                <div class="group-item" data-group="tuning"><span class="group-icon">🔧</span>
                    <div><span class="group-name">تیونینگ</span><span class="group-count">--</span></div>
                </div>
            </div>
        </aside>
        <main class="chat-main">
            <div class="chat-header"><button class="mobile-toggle" id="menuToggle">☰</button>
                <div>
                    <h2 id="groupTitle">💬 عمومی</h2><span class="online-count" id="onlineCount">--</span>
                </div><span class="online-dot"></span>
            </div>
            <div class="typing-indicator" id="typingIndicator"></div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="scroll-bottom-btn" id="scrollBottomBtn">↓<span class="badge" id="newMsgBadge"
                    style="display:none">0</span></div>
            <div class="chat-input-area">
                <div class="reply-bar" id="replyBar"><span id="replyText"></span><button class="cancel-reply"
                        id="cancelReply">✕</button></div>
                <input type="text" id="messageInput" placeholder="پیامت رو بنویس..." autocomplete="off"
                    maxlength="500"><button class="send-btn" id="sendBtn">📨</button>
            </div>
        </main>
    </div>
    <div class="admin-panel" id="adminPanel"><button class="admin-close" id="adminClose">✕</button>
        <h3>👑 پنل ادمین</h3>
        <div id="adminUserList"></div>
    </div>
    <div class="toast" id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
    <script>
        (async function () {
            var userData = await checkAuth();
            if (!userData) { showGlassModal('❌ خطا', 'اول باید وارد بشی!', [{ text: 'ورود', class: 'btn-primary', action: function () { window.location.href = 'index.html'; } }]); return }
            var username = userData.username, userId = userData.id, avatar = userData.avatar || '👤';
            var userRole = userData.role || 'user', currentGroup = 'general', renderedIds = new Set();
            var supabase = supabaseClient;
            var replyTo = null, unreadCount = 0, isAtBottom = true;

            var chatMessages = document.getElementById('chatMessages'), messageInput = document.getElementById('messageInput'),
                sendBtn = document.getElementById('sendBtn'), groupTitle = document.getElementById('groupTitle'),
                menuToggle = document.getElementById('menuToggle'), sidebar = document.getElementById('sidebar'),
                onlineCount = document.getElementById('onlineCount'), displayName = document.getElementById('displayName'),
                roleBadge = document.getElementById('roleBadge'), sidebarAvatar = document.getElementById('sidebarAvatar'),
                logoutBtn = document.getElementById('logoutBtn'), adminPanelBtn = document.getElementById('adminPanelBtn'),
                adminPanel = document.getElementById('adminPanel'), adminClose = document.getElementById('adminClose'),
                adminUserList = document.getElementById('adminUserList'),
                typingIndicator = document.getElementById('typingIndicator'),
                scrollBottomBtn = document.getElementById('scrollBottomBtn'),
                newMsgBadge = document.getElementById('newMsgBadge'),
                replyBar = document.getElementById('replyBar'), replyText = document.getElementById('replyText'),
                cancelReply = document.getElementById('cancelReply');

            var closeSidebarBtn = document.getElementById('closeSidebarBtn');
            if (closeSidebarBtn) closeSidebarBtn.addEventListener('click', function () { sidebar.classList.remove('open'); });

            function updateUI() { displayName.textContent = username; sidebarAvatar.textContent = avatar; if (userRole === 'admin') { roleBadge.textContent = 'ادمین 👑'; roleBadge.className = 'user-role-badge admin'; adminPanelBtn.style.display = 'block' } else { roleBadge.textContent = 'کاربر'; roleBadge.className = 'user-role-badge user'; adminPanelBtn.style.display = 'none' } }
            updateUI();

            function showToast(msg, type) { type = type || 'info'; var t = document.getElementById('toast'); if (!t) return; t.textContent = msg; t.className = 'toast toast-' + type + ' show'; setTimeout(function () { t.classList.remove('show'); }, 2500); }
            function showGlassModal(title, message, buttons) { var overlay = document.createElement('div'); overlay.className = 'modal-glass-overlay'; var btnsHtml = buttons.map(function (b, i) { return '<button class="' + b.class + '" id="modalBtn' + i + '">' + b.text + '</button>'; }).join(''); overlay.innerHTML = '<div class="modal-glass-box"><h3>' + title + '</h3><p>' + message + '</p><div class="modal-glass-btns">' + btnsHtml + '</div></div>'; document.body.appendChild(overlay); buttons.forEach(function (b, i) { document.getElementById('modalBtn' + i).onclick = function () { document.body.removeChild(overlay); if (b.action) b.action(); }; }); overlay.addEventListener('click', function (e) { if (e.target === overlay) document.body.removeChild(overlay); }); }

            function linkify(text) { var urlRegex = /(https?:\/\/[^\s<]+)/g; return text.replace(urlRegex, function (url) { return '<a href="' + url + '" target="_blank" rel="noopener">' + url + '</a>'; }); }

            // ===== ریپلای =====
            cancelReply.addEventListener('click', function () { replyTo = null; replyBar.classList.remove('show'); messageInput.placeholder = 'پیامت رو بنویس...'; });
            window._replyMsg = function (id, msgUsername, msgText) {
                replyTo = { id: id, username: msgUsername, text: msgText.substring(0, 50) };
                replyBar.classList.add('show');
                replyText.textContent = '↩ پاسخ به ' + msgUsername + ': ' + msgText.substring(0, 40) + '...';
                messageInput.placeholder = 'پاسخت رو بنویس...';
                messageInput.focus();
            };

            // ===== اسکرول =====
            chatMessages.addEventListener('scroll', function () { isAtBottom = chatMessages.scrollHeight - chatMessages.scrollTop - chatMessages.clientHeight < 50; if (isAtBottom) { scrollBottomBtn.classList.remove('show'); unreadCount = 0; newMsgBadge.style.display = 'none'; } });
            scrollBottomBtn.addEventListener('click', function () { chatMessages.scrollTop = chatMessages.scrollHeight; scrollBottomBtn.classList.remove('show'); unreadCount = 0; newMsgBadge.style.display = 'none'; isAtBottom = true; });

            // ===== تایپینگ =====
            var typingTimer, typingUsers = {};
            messageInput.addEventListener('input', function () {
                clearTimeout(typingTimer);
                supabase.from('typing').upsert({ user_id: userId, username: username, group_name: currentGroup, timestamp: new Date().toISOString() });
                typingTimer = setTimeout(function () { supabase.from('typing').delete().eq('user_id', userId); }, 2000);
            });

            async function updateTypingIndicator() {
                var cutoff = new Date(Date.now() - 3000).toISOString();
                var result = await supabase.from('typing').select('*').eq('group_name', currentGroup).gt('timestamp', cutoff);
                var typings = result.data || [];
                var others = typings.filter(function (t) { return t.user_id !== userId; });
                if (others.length > 0) {
                    var names = others.map(function (t) { return t.username; }).join(' و ');
                    typingIndicator.innerHTML = '<span class="typing-dots"><span></span><span></span><span></span></span> ' + names + ' داره تایپ می‌کنه...';
                } else { typingIndicator.innerHTML = ''; }
            }

            // ===== EDIT MODAL =====
            function editMessageModal(msgId, oldText) { var overlay = document.createElement('div'); overlay.className = 'modal-glass-overlay'; overlay.innerHTML = '<div class="modal-glass-box"><h3>✏️ ویرایش پیام</h3><input id="editInput" value="' + oldText.replace(/"/g, '&quot;') + '" maxlength="500"><div class="modal-glass-btns"><button class="btn-primary" id="editSave">💾 ذخیره</button><button class="btn-cancel" id="editCancel">لغو</button></div></div>'; document.body.appendChild(overlay); document.getElementById('editSave').onclick = function () { var newText = document.getElementById('editInput').value.trim(); document.body.removeChild(overlay); if (newText && newText !== oldText) saveEdit(msgId, newText); }; document.getElementById('editCancel').onclick = function () { document.body.removeChild(overlay); }; overlay.addEventListener('click', function (e) { if (e.target === overlay) document.body.removeChild(overlay); }); }
            async function saveEdit(msgId, newText) { await supabase.from('chat_messages').update({ text: newText, edited: true }).eq('id', msgId); var bubble = document.querySelector('#msg-' + msgId + ' .msg-bubble'); if (bubble) bubble.innerHTML = linkify(newText); var info = document.querySelector('#msg-' + msgId + ' .msg-info'); if (info) info.innerHTML = '<span>' + username + '</span><span class="edited-badge">(ویرایش)</span><span>' + new Date().toLocaleTimeString('fa-IR', { hour: '2-digit', minute: '2-digit' }) + '</span>'; }

            logoutBtn.addEventListener('click', function () { showGlassModal('🚪 خروج', 'می‌خوای از چت خارج بشی؟', [{ text: '🚪 خروج', class: 'btn-danger', action: async function () { await logoutUser(); window.location.href = 'index.html'; } }, { text: 'بمون', class: 'btn-cancel', action: function () { } }]); });
            adminPanelBtn.addEventListener('click', function () { adminPanel.classList.toggle('open'); renderAdminPanel(); });
            adminClose.addEventListener('click', function () { adminPanel.classList.remove('open'); });

            async function renderAdminPanel() { var result = await supabase.from('profiles').select('*'); var users = result.data; var bannedResult = await supabase.from('banned_users').select('user_id'); var bannedIds = bannedResult.data ? bannedResult.data.map(function (b) { return b.user_id; }) : []; adminUserList.innerHTML = users ? users.map(function (u) { var isBanned = bannedIds.indexOf(u.id) !== -1; return '<div class="admin-user-item"><span>👤 ' + (u.username || u.email) + '</span><div class="admin-actions-row">' + (u.role !== 'admin' ? '<button class="msg-action-btn" onclick="window._upRole(\'' + u.id + '\',\'admin\')">👑</button>' : '<button class="msg-action-btn" onclick="window._upRole(\'' + u.id + '\',\'user\')">⬇️</button>') + (u.id !== userId ? (isBanned ? '<button class="msg-action-btn" onclick="window._unbanUser(\'' + u.id + '\')">🔓</button>' : '<button class="msg-action-btn delete" onclick="window._banUser(\'' + u.id + '\')">🚫</button>') : '') + '</div></div>'; }).join('') : '<p style="color:rgba(179,236,255,.3)">کسی نیست</p>'; }
            window._upRole = async function (uid, role) { await supabase.from('profiles').upsert({ id: uid, role: role }); showToast('✅ انجام شد', 'success'); renderAdminPanel(); };
            window._banUser = function (uid) { showGlassModal('🚫 بن کردن کاربر', 'این کاربر برای همیشه از چت محروم بشه؟', [{ text: '🚫 بن کن', class: 'btn-danger', action: async function () { await supabase.from('banned_users').upsert({ user_id: uid, banned_by: userId, banned_at: new Date().toISOString() }); await supabase.from('chat_messages').delete().eq('user_id', uid); await supabase.from('online_users').delete().eq('user_id', uid); showToast('🚫 کاربر بن شد', 'success'); renderAdminPanel(); loadMessages(); } }, { text: 'لغو', class: 'btn-cancel', action: function () { } }]); };
            window._unbanUser = function (uid) { showGlassModal('🔓 آزاد کردن کاربر', 'این کاربر دوباره بتونه چت کنه؟', [{ text: '🔓 آزاد کن', class: 'btn-success', action: async function () { await supabase.from('banned_users').delete().eq('user_id', uid); showToast('🔓 کاربر آزاد شد', 'success'); renderAdminPanel(); } }, { text: 'لغو', class: 'btn-cancel', action: function () { } }]); };
            window._delMsg = function (id) { showGlassModal('🗑 حذف پیام', 'این پیام برای همیشه حذف بشه؟', [{ text: '🗑 حذف', class: 'btn-danger', action: async function () { await supabase.from('chat_messages').delete().eq('id', id); var el = document.getElementById('msg-' + id); if (el) el.remove(); } }, { text: 'لغو', class: 'btn-cancel', action: function () { } }]); };

            async function loadMessages() { var result = await supabase.from('chat_messages').select('*').eq('group_name', currentGroup).order('created_at', { ascending: true }).limit(200); var data = result.data; if (!data || !data.length) { chatMessages.innerHTML = '<div style="text-align:center;color:rgba(179,236,255,.3);padding:40px">💬<br>هنوز پیامی نیست!</div>'; renderedIds.clear(); return } var hasNew = false; data.forEach(function (msg) { if (!renderedIds.has(msg.id)) { appendMessage(msg); hasNew = true; if (!isAtBottom) { unreadCount++; newMsgBadge.textContent = unreadCount; newMsgBadge.style.display = 'flex'; scrollBottomBtn.classList.add('show'); } } }); if (hasNew && isAtBottom) chatMessages.scrollTop = chatMessages.scrollHeight; }

            function appendMessage(msg) { if (renderedIds.has(msg.id)) return; var isOwn = msg.user_id === userId, isAdmin = userRole === 'admin'; var div = document.createElement('div'); div.className = 'message' + (isOwn ? ' own' : ''); div.id = 'msg-' + msg.id; var replyHtml = ''; if (msg.reply_to) { replyHtml = '<div class="msg-reply-to" onclick="document.getElementById(\'msg-' + msg.reply_to + '\')?.scrollIntoView({behavior:\'smooth\'})">↩ پاسخ به ' + msg.reply_username + '</div>'; } var actions = '<button class="msg-action-btn reply" onclick="window._replyMsg(\'' + msg.id + '\',\'' + msg.username + '\',\'' + msg.text.replace(/'/g, "\\'") + '\')">↩</button>'; if (isOwn) actions += '<button class="msg-action-btn" onclick="window._editMsg(\'' + msg.id + '\',\'' + msg.text.replace(/'/g, "\\'") + '\')">✏️</button>'; if (isOwn || isAdmin) actions += '<button class="msg-action-btn delete" onclick="window._delMsg(\'' + msg.id + '\')">🗑</button>'; div.innerHTML = '<div class="msg-avatar" title="' + msg.username + '">' + (msg.avatar || '👤') + '</div><div class="msg-content">' + replyHtml + '<div class="msg-info"><span>' + (msg.username || 'ناشناس') + '</span>' + (msg.edited ? '<span class="edited-badge">(ویرایش)</span>' : '') + '<span>' + new Date(msg.created_at).toLocaleTimeString('fa-IR', { hour: '2-digit', minute: '2-digit' }) + '</span></div><div class="msg-bubble">' + linkify(msg.text) + '</div><div class="msg-actions">' + actions + '</div></div>'; chatMessages.appendChild(div); renderedIds.add(msg.id); }

            async function sendMessage() { var text = messageInput.value.trim(); if (!text) return; var bannedResult = await supabase.from('banned_users').select('user_id').eq('user_id', userId); if (bannedResult.data && bannedResult.data.length > 0) { showToast('🚫 شما بن شدید!', 'error'); return } var msg = { user_id: userId, username: username, avatar: avatar, text: text, group_name: currentGroup, edited: false }; if (replyTo) { msg.reply_to = replyTo.id; msg.reply_username = replyTo.username; replyTo = null; replyBar.classList.remove('show'); messageInput.placeholder = 'پیامت رو بنویس...'; } var result = await supabase.from('chat_messages').insert(msg); if (!result.error) { messageInput.value = ''; supabase.from('typing').delete().eq('user_id', userId); loadMessages(); } else showToast('❌ خطا در ارسال', 'error'); }

            window._editMsg = function (id, oldText) { editMessageModal(id, oldText); };
            document.querySelectorAll('.group-item').forEach(function (item) { item.addEventListener('click', function () { switchGroup(item.dataset.group); }); });
            function switchGroup(group) { currentGroup = group; document.querySelectorAll('.group-item').forEach(function (i) { i.classList.remove('active'); }); var activeItem = document.querySelector('[data-group="' + group + '"]'); if (activeItem) activeItem.classList.add('active'); var nameEl = document.querySelector('[data-group="' + group + '"] .group-name'); groupTitle.textContent = nameEl ? nameEl.textContent : group; chatMessages.innerHTML = ''; renderedIds.clear(); loadMessages(); }
            sendBtn.addEventListener('click', sendMessage); messageInput.addEventListener('keypress', function (e) { if (e.key === 'Enter') sendMessage(); }); menuToggle.addEventListener('click', function () { sidebar.classList.toggle('open'); });
            async function updatePresence() { await supabase.from('online_users').upsert({ user_id: userId, username: username, avatar: avatar, group_name: currentGroup, last_seen: new Date().toISOString() }); }
            async function cleanupOnline() { var cutoff = new Date(Date.now() - 10000).toISOString(); await supabase.from('online_users').delete().lt('last_seen', cutoff); }
            async function updateOnlineDisplay() { var result = await supabase.from('online_users').select('*'); var data = result.data, total = data ? data.length : 0; if (onlineCount) onlineCount.textContent = total + ' نفر آنلاین'; document.querySelectorAll('.group-item').forEach(function (item) { var g = item.dataset.group, count = data ? data.filter(function (u) { return u.group_name === g; }).length : 0; var el = item.querySelector('.group-count'); if (el) el.textContent = count + ' آنلاین'; }); }
            loadMessages(); updatePresence(); updateOnlineDisplay(); setInterval(loadMessages, 2000); setInterval(updatePresence, 3000); setInterval(cleanupOnline, 10000); setInterval(updateOnlineDisplay, 3000); setInterval(updateTypingIndicator, 2000); window.addEventListener('beforeunload', async function () { await supabase.from('online_users').delete().eq('user_id', userId); await supabase.from('typing').delete().eq('user_id', userId); });
        })();
    </script>
</body>

</html>
